<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.55" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#1f2042" flood-opacity="0.16"/>
    </filter>
    <style>
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      .sans {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#1f2042"/>
  <path d="M0 470 C210 390 330 610 540 506 C740 408 820 182 1060 236 C1166 260 1230 314 1280 382 L1280 640 L0 640 Z" fill="#f5a524" opacity="0.18"/>
  <path d="M0 108 C172 40 332 28 480 78 C646 134 764 108 924 48 C1064 -4 1190 12 1280 72 L1280 0 L0 0 Z" fill="#f5a524" opacity="0.12"/>

  <rect x="72" y="72" width="1136" height="496" rx="44" fill="url(#paper)" filter="url(#soft-shadow)"/>
  <rect x="104" y="104" width="1072" height="432" rx="28" fill="#ffffff" opacity="0.78"/>
  <rect x="104" y="104" width="1072" height="432" rx="28" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <g transform="translate(138 138) scale(0.58)" fill="none" stroke="#1f2042" stroke-width="15" stroke-linejoin="round" stroke-linecap="round">
    <polyline points="70,26 25,96 70,166"/>
    <polyline points="250,26 295,96 250,166"/>
    <path transform="translate(95 40)" d="M10 0 L82 0 L100 18 L100 70 A10 10 0 0 1 90 80 L30 80 L18 92 L14 80 L10 80 A10 10 0 0 1 0 70 L0 10 A10 10 0 0 1 10 0 Z" fill="#F5A524"/>
    <path transform="translate(125 60)" d="M10 0 L82 0 L100 18 L100 70 A10 10 0 0 1 90 80 L30 80 L18 92 L14 80 L10 80 A10 10 0 0 1 0 70 L0 10 A10 10 0 0 1 10 0 Z" fill="#F5A524"/>
  </g>

  <text x="348" y="222" class="mono" fill="#1f2042" font-size="82" font-weight="800" letter-spacing="-2">&lt;html-collab&gt;</text>
  <text x="142" y="342" class="sans" fill="#1f2042" font-size="44" font-weight="800">Portable HTML review files for AI-built reports.</text>
  <text x="144" y="404" class="sans" fill="#475569" font-size="30" font-weight="600">Comments, suggested edits, deterministic merge, and AI-ready briefs.</text>
  <text x="144" y="444" class="sans" fill="#475569" font-size="30" font-weight="600">All inside one portable file.</text>

  <g transform="translate(144 482)">
    <rect x="0" y="0" width="156" height="46" rx="23" fill="#fef3c7" stroke="#f5a524" stroke-width="2"/>
    <text x="24" y="31" class="sans" fill="#92400e" font-size="19" font-weight="800">single-file</text>

    <rect x="176" y="0" width="162" height="46" rx="23" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="200" y="31" class="sans" fill="#1d4ed8" font-size="19" font-weight="800">local-first</text>

    <rect x="358" y="0" width="174" height="46" rx="23" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
    <text x="382" y="31" class="sans" fill="#166534" font-size="19" font-weight="800">AI handoff</text>
