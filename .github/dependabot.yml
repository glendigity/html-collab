version: 2
multi-ecosystem-groups:
  dependencies:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
updates:
  - package-ecosystem: "bun"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "dependencies"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "dependencies"
    cooldown:
      default-days: 7
